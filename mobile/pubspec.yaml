name: ktk_messenger_mobile
description: Flutter client for KTK Messenger.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  socket_io_client: ^3.1.4
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
